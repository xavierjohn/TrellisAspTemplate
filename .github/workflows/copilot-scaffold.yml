name: Copilot Scaffold Project
on:
  issues:
    types: [labeled]
permissions:
  contents: write
  pull-requests: write
  issues: write
jobs:
  scaffold:
    if: github.event.label.name == 'copilot-scaffold'
    runs-on: ubuntu-latest
    steps:
      - name: Add Comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '?? **FunctionalDDD Clean Architecture Scaffolding Started!** - Copilot will now scaffold your project.'
            })
      
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      
      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
      
      - name: Read Spec
        id: spec
        run: |
          if [ ! -f .github/project-spec.yml ]; then
            echo "Project specification not found"
            exit 1
          fi
          NAME=$(yq '.project.name' .github/project-spec.yml)
          SPEC=$(yq -o=json '.' .github/project-spec.yml)
          echo "project-name=$NAME" >> $GITHUB_OUTPUT
          echo "spec-json<<EOF" >> $GITHUB_OUTPUT
          echo "$SPEC" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      
      - name: Create Branch
        run: |
          BRANCH="scaffold-${{ github.event.issue.number }}-${{ steps.spec.outputs.project-name }}"
          git checkout -b "$BRANCH"
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV
      
      - name: Generate
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const spec = JSON.parse(`${{ steps.spec.outputs.spec-json }}`);
            const content = `# ${spec.project.name}\n\n${spec.project.description}\n\nScaffolded by FunctionalDDD Agent.`;
            fs.writeFileSync('README.md', content);
            console.log('Generated project structure');
      
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "feat: scaffold ${{ steps.spec.outputs.project-name }}"
          git push origin "$BRANCH"
      
      - name: Create PR
        uses: actions/github-script@v7
        with:
          script: |
            const spec = JSON.parse(`${{ steps.spec.outputs.spec-json }}`);
            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Scaffold ${spec.project.name}`,
              head: process.env.BRANCH,
              base: 'main',
              body: `Scaffolded from issue #${{ github.event.issue.number }}`
            });
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `? Complete! See PR #${pr.number}`
            });
      
      - name: Handle Failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '? Scaffolding failed. Check workflow logs.'
            })
